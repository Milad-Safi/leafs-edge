name: Daily NHL ingest

on:
    schedule:
        - cron: "17 06 * * *"
          timezone: "America/Toronto"
    workflow_dispatch:

concurrency:
    group: daily-nhl-ingest
    cancel-in-progress: false

jobs:
    ingest:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: ./ml-service

        env:
            TZ: America/Toronto
            DATABASE_URL: ${{ secrets.DATABASE_URL }}

        steps:
            - name: Check out repo
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Compute yesterday in Toronto time
              id: dates
              run: |
                  YESTERDAY=$(python - <<'PY'
                  from datetime import datetime, timedelta
                  from zoneinfo import ZoneInfo

                  yesterday = (
                      datetime.now(ZoneInfo("America/Toronto")).date()
                      - timedelta(days=1)
                  ).isoformat()

                  print(yesterday)
                  PY
                  )

                  echo "yesterday=$YESTERDAY" >> "$GITHUB_OUTPUT"
                  echo "Using date: $YESTERDAY"

            - name: Run ingest
              run: |
                  python -m app.ingest_nhl "${{ steps.dates.outputs.yesterday }}" "${{ steps.dates.outputs.yesterday }}"